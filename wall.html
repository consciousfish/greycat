<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greycat781 — Стена</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #202225;
            color: #fff;
            font-family: sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #18191c;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #5865f2;
        }
        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        nav a {
            color: #b9bbbe;
            text-decoration: none;
            font-size: 16px;
        }
        nav a:hover {
            color: #fff;
        }
        .discord-btn {
            background-color: #5865f2;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
        }
        .main-content {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }
        .comment-box-wrapper {
            background-color: #2f3136;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .reply-indicator {
            display: none;
            justify-content: space-between;
            align-items: center;
            background: #18191c;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #b9bbbe;
            border-left: 4px solid #aa8ed6;
        }
        .input-container {
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 15px;
            background-color: #202225;
            border: 1px solid #18191c;
            border-radius: 6px;
            color: white;
            font-size: 18px;
            outline: none;
        }
        input:focus {
            border-color: #5865f2;
        }
        .send-btn {
            background-color: #248046;
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .send-btn:hover {
            background-color: #1a6535;
        }
        .send-btn:disabled {
            background-color: #4f545c;
            cursor: not-allowed;
        }
        #postsContainer {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
            margin-top: 20px;
        }
        .post {
            background-color: #2f3136;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }
        /* Контейнер веток как на сайтах с фильмами */
        .replies-container {
            margin-left: 50px;
            border-left: 2px dashed #4f545c;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .reaction-btn {
            background: #18191c;
            border: 1px solid #202225;
            color: #b9bbbe;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .reaction-btn:hover {
            color: #fff;
            border-color: #5865f2;
            background: #202225;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">greycat781</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="memes.html">Мемы</a>
            <a href="wall.html" style="color: #fff;">Стена</a>
            <a href="#" class="discord-btn">Discord</a>
        </nav>
    </header>

    <div class="main-content">
        <h1>Стена приколов</h1>

        <div id="userProfile" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: #18191c; padding: 15px 20px; border-radius: 8px; border: 1px solid #2f3136;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img id="userAvatar" src="" alt="Avatar" style="width: 55px; height: 55px; border-radius: 50%; display: none; border: 2px solid #5865f2; object-fit: cover;">
                <div style="display: flex; flex-direction: column; gap: 4px; text-align: left;">
                    <span id="userStatus" style="color: #b9bbbe; font-weight: bold; font-size: 16px;">Вы вошли как гость</span>
                    <label style="color: #5865f2; font-size: 14px; cursor: pointer; text-decoration: underline;">
                        Загрузить свою аватарку
                        <input type="file" id="avatarLoader" accept="image/*" onchange="uploadCustomAvatar(event)" style="display: none;">
                    </label>
                </div>
            </div>
            <button id="authBtn" onclick="loginUser()" style="background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px;">Войти / Сменить ник</button>
        </div>

        <div class="comment-box-wrapper">
            <div id="replyIndicator" class="reply-indicator">
                <span id="replyIndicatorText">Вы отвечаете пользователю</span>
                <button onclick="cancelReply()" style="background:none; border:none; color:#da373c; cursor:pointer; font-weight:bold;">[Отмена]</button>
            </div>
            <div class="input-container">
                <input type="text" id="postInput" placeholder="Напиши что-нибудь на стене...">
                <button class="send-btn" id="sendBtn">Отправить</button>
            </div>
        </div>

        <div id="postsContainer">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
