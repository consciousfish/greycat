<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greycat781 — Чат</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 14px 40px;
            background-color: #181818;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            border-bottom: 1px solid #2a2a2a;
        }
        header .logo {
            font-size: 1.35rem;
            font-weight: 900;
            color: #ff5500;
            text-transform: lowercase;
            letter-spacing: -0.5px;
        }
        header nav {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        header nav a {
            color: #999999;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        header nav a:hover { color: #fff; border-color: #3a3a3a; }
        header nav a.active { color: #fff; }
        .discord-btn {
            background-color: #ff5500 !important;
            color: white !important;
            border-radius: 20px !important;
            font-weight: 600 !important;
            border: none !important;
        }
        .discord-btn:hover { background-color: #ff7733 !important; }
        .main-content {
            max-width: 850px;
            margin: 120px auto 40px;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        #userProfile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #181818;
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        .comment-box-wrapper {
            background-color: #1f1f1f;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 28px;
            border: 1px solid #2a2a2a;
        }
        .reply-indicator {
            display: none;
            justify-content: space-between;
            align-items: center;
            background: #111111;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #999;
            border-left: 3px solid #ff5500;
        }
        .input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-container input {
            flex: 1;
            padding: 13px 16px;
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-container input:focus { border-color: #ff5500; }
        .attach-btn, .send-btn, #authBtn {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }
        .attach-btn {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #333;
            padding: 13px 16px;
            font-size: 16px;
        }
        .attach-btn:hover { background-color: #333; border-color: #ff5500; }
        .send-btn, #authBtn {
            background-color: #ff5500;
            color: white;
            padding: 13px 24px;
            font-size: 0.9rem;
        }
        .send-btn:hover, #authBtn:hover { background-color: #ff7733; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .preview-media-container {
            display: none;
            position: relative;
            margin-top: 12px;
            background: #111;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            max-width: 220px;
            border: 1px solid #2a2a2a;
        }
        .preview-media-container img {
            max-width: 100%;
            max-height: 160px;
            border-radius: 4px;
            display: block;
        }
        .remove-preview-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e03c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-weight: bold;
        }
        #chatContainer {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
            margin-top: 20px;
        }
        .chat-message {
            background-color: #1f1f1f;
            padding: 18px 20px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            border-left: 3px solid #ff5500;
            width: 100%;
        }
        .reply-message {
            background-color: #222427;
        }
        .replies-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .chat-attached-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 6px;
            margin-top: 12px;
            display: block;
            border: 1px solid #2a2a2a;
        }
        .reaction-btn {
            background: #111111;
            border: 1px solid #2a2a2a;
            color: #999;
            padding: 5px 13px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .reaction-btn:hover {
            color: #fff;
            border-color: #ff5500;
            background: #1f1f1f;
        }
        .reply-link-btn {
            background: none;
            border: none;
            color: #ff5500;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            padding: 0;
            margin-left: 10px;
        }
        @media (max-width: 620px) {
            .input-container, #userProfile {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo">greycat781</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="wall.html">Форум</a>
            <a href="chat.html" class="active">Чат</a>
            <a href="https://discord.gg/9FV6q4qbjm" target="_blank" class="discord-btn">Discord</a>
        </nav>
    </header>

    <div class="main-content">
        <h1>Чат</h1>

        <div id="userProfile">
            <div style="display:flex;align-items:center;gap:14px;">
                <img id="userAvatar" src="" alt="Avatar" style="width:64px;height:64px;border-radius:50%;display:none;border:2px solid #ff5500;object-fit:cover;">
                <div style="display:flex;flex-direction:column;gap:4px;text-align:left;">
                    <span id="userStatus" style="color:#999;font-weight:600;font-size:15px;">Вы вошли как гость</span>
                    <label style="color:#ff5500;font-size:13px;cursor:pointer;text-decoration:underline;">
                        Загрузить свою аватарку
                        <input type="file" id="avatarLoader" accept="image/*" onchange="uploadCustomAvatar(event)" style="display:none;">
                    </label>
                </div>
            </div>
            <button id="authBtn" onclick="loginUser()">Войти / Сменить ник</button>
        </div>

        <div class="comment-box-wrapper">
            <div id="replyIndicator" class="reply-indicator">
                <span id="replyIndicatorText">Вы отвечаете пользователю</span>
                <button onclick="cancelReply()" style="background:none;border:none;color:#e03c3c;cursor:pointer;font-weight:bold;font-family:'Inter',sans-serif;">[Отмена]</button>
            </div>
            <div class="input-container">
                <button class="attach-btn" title="Прикрепить фото или GIF" onclick="document.getElementById('mediaUploader').click()">🖼️</button>
                <input type="file" id="mediaUploader" accept="image/*,image/gif" onchange="handleMediaSelect(event)" style="display:none;">
                <input type="text" id="chatInput" placeholder="Напиши сообщение в чат...">
                <button class="send-btn" id="sendBtn">Отправить</button>
            </div>
            <div id="previewMediaContainer" class="preview-media-container">
                <button class="remove-preview-btn" onclick="clearMediaPreview()">×</button>
                <img id="previewMediaImg" src="" alt="Превью">
            </div>
        </div>

        <div id="chatContainer"></div>
    </div>

    <script src="chat.js?v=chat-20260515"></script>
</body>
</html>
