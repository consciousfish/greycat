<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greycat781 — Главная</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .particle {
            position: fixed;
            width: 72px;
            height: 72px;
            left: 0;
            top: 0;
            z-index: 2000;
            pointer-events: none;
            object-fit: cover;
            border-radius: 8px;
            animation: particle-burst 900ms ease-out forwards;
            --tx: 0px;
            --ty: 0px;
            --rot: 0deg;
        }
        .particle.text {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            line-height: 1;
        }
        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.65) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.15) rotate(var(--rot));
            }
        }
        .emoji-admin {
            display: none;
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 2100;
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 10px;
            color: #999;
            font-size: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
        }
        .emoji-admin label {
            color: #ff5500;
            cursor: pointer;
            font-weight: 700;
        }
        .logo {
            cursor: pointer;
            user-select: none;
        }
        .home-lore-link {
            max-width: 720px;
            margin: -120px auto 70px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .home-lore-card {
            display: block;
            background: #1f1f1f;
            border: 1px solid #2a2a2a;
            border-left: 3px solid #ff5500;
            border-radius: 8px;
            padding: 18px 20px;
            color: inherit;
            text-decoration: none;
            text-align: left;
            transition: transform 0.15s, border-color 0.15s, background 0.15s;
        }
        .home-lore-card:hover {
            transform: translateY(-2px);
            border-color: #ff5500;
            background: #242424;
        }
        .home-lore-card span {
            display: inline-flex;
            color: #ff5500;
            font-size: 0.78rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .home-lore-card h2 {
            margin: 0 0 10px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 0;
        }
        .home-lore-card p {
            margin: 0;
            color: #aaa;
            font-size: 0.94rem;
            line-height: 1.45;
        }
        @media (max-width: 640px) {
            .particle {
                width: 54px;
                height: 54px;
            }
            .particle.text {
                font-size: 42px;
            }
            .emoji-admin {
                right: 10px;
                bottom: 10px;
                max-width: calc(100vw - 20px);
            }
            .home-lore-link {
                margin: -80px auto 44px;
                padding: 0 12px;
            }
            .home-lore-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="if(event.ctrlKey) unlockEmojiAdmin()">greycat781</div>
        <ul class="nav-links">
            <li><a href="./index.html">Главная</a></li>
            <li><a href="./lore.html">Лор</a></li>
            <li><a href="./wall.html">Форум</a></li>
            <li><a href="./spy.html">Шпион</a></li>
            <li><a href="https://discord.gg/9FV6q4qbjm" target="_blank" class="discord-btn">Discord</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="centered-section">
            <h1 class="giant-title">greycat781</h1>
            <p class="subtitle">халупа червяка</p>
        </section>

        <section class="home-lore-link" aria-label="Лор сервера">
            <a class="home-lore-card" href="./lore.html">
                <span>архив сервера</span>
                <h2>Лор greycat781</h2>
                <p>Полная история сервера: общее, мутанты, мутанты-билды, мутные болота, картинки, участники, мемы и всё, что случайно стало каноном.</p>
            </a>
        </section>
    </main>
    <div id="emojiAdmin" class="emoji-admin">
        <label>
            Заменить эмодзи
            <input type="file" accept="image/*" onchange="setEmojiImage(event)" style="display:none;">
        </label>
        <button onclick="resetEmojiImage()" style="margin-left:8px;background:#2a1010;color:#e03c3c;border:1px solid rgba(224,60,60,0.35);border-radius:6px;padding:6px 8px;cursor:pointer;">Сброс</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uyjyjkualjybzfckmgdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QADVddyaye_VV4M3JIEQDQ_iE0YF0lH';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = "cat781grey";
        const PARTICLE_CONFIG_PREFIX = '[greycat-home-particles]';
        const DEFAULT_PARTICLES = ['✨', '🔥', '💥', '⭐', '🧡', '🎮'];
        let customParticleImage = '';
        let particleConfigPostId = null;

        function hasEmojiAdminAccess() {
            return localStorage.getItem('forum_admin_unlocked') === 'true';
        }

        function updateEmojiAdmin() {
            const panel = document.getElementById('emojiAdmin');
            if (panel) panel.style.display = hasEmojiAdminAccess() ? 'block' : 'none';
        }

        function unlockEmojiAdmin() {
            if (hasEmojiAdminAccess()) {
                updateEmojiAdmin();
                return;
            }
            const pass = prompt('Пароль модератора:');
            if (pass === ADMIN_PASS) {
                localStorage.setItem('forum_admin_unlocked', 'true');
                localStorage.setItem('forum_admin_mode', 'true');
                updateEmojiAdmin();
            } else if (pass !== null) {
                alert('Неверный пароль!');
            }
        }

        async function loadGlobalParticleImage() {
            const { data, error } = await supabaseClient
                .from('posts')
                .select('id,text')
                .order('id', { ascending: false })
                .limit(100);
            if (error) return;
            const configPost = (data || []).find(post => post.text && post.text.startsWith(PARTICLE_CONFIG_PREFIX));
            if (!configPost) return;
            particleConfigPostId = configPost.id;
            try {
                const config = JSON.parse(configPost.text.slice(PARTICLE_CONFIG_PREFIX.length));
                customParticleImage = config.image || '';
            } catch (e) {
                customParticleImage = '';
            }
        }

        async function saveGlobalParticleImage(image) {
            const text = PARTICLE_CONFIG_PREFIX + JSON.stringify({ image, updatedAt: Date.now() });
            if (particleConfigPostId) {
                const { error } = await supabaseClient.from('posts').update({ text }).eq('id', particleConfigPostId);
                if (error) throw error;
                return;
            }
            const { data, error } = await supabaseClient
                .from('posts')
                .insert([{ text, username: 'home-particles', avatar: '', parent_id: null, image: null }])
                .select('id')
                .single();
            if (error) throw error;
            particleConfigPostId = data.id;
        }

        window.setEmojiImage = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                customParticleImage = e.target.result;
                try {
                    await saveGlobalParticleImage(customParticleImage);
                    alert('Глобальная картинка эмодзи сохранена.');
                } catch (error) {
                    alert('Не получилось сохранить картинку глобально: ' + error.message);
                }
            };
            reader.readAsDataURL(file);
        };

        window.resetEmojiImage = async function() {
            customParticleImage = '';
            try {
                await saveGlobalParticleImage('');
            } catch (error) {
                alert('Не получилось сбросить картинку глобально: ' + error.message);
            }
        };

        document.addEventListener('click', (event) => {
            if (event.target.closest('a, button, input, label')) return;
            for (let i = 0; i < 10; i += 1) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 70 + Math.random() * 150;
                const particle = customParticleImage ? document.createElement('img') : document.createElement('div');
                particle.className = customParticleImage ? 'particle' : 'particle text';
                if (customParticleImage) particle.src = customParticleImage;
                else particle.textContent = DEFAULT_PARTICLES[Math.floor(Math.random() * DEFAULT_PARTICLES.length)];
                particle.style.left = `${event.clientX}px`;
                particle.style.top = `${event.clientY}px`;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                particle.style.setProperty('--rot', `${Math.floor(Math.random() * 240 - 120)}deg`);
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 950);
            }
        });

        loadGlobalParticleImage();
        updateEmojiAdmin();
    </script>
</body>
</html>
